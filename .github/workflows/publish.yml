name: Publish CLI

# Push a full-semver tag (e.g. `git tag v1.0.1 && git push origin v1.0.1`) to publish norma-design-lint.
# One-time setup by the maintainer: add an npm automation token as the NPM_TOKEN repo secret.
on:
  push:
    # Full-semver tags only (`vX.Y.Z`). Deliberately NOT `v*`: that also matches the moving major
    # tag `vN` (e.g. `v1`), so manually moving `vN` re-triggers this workflow only for the version
    # guard below to refuse it (`vN` != the CLI version) — leaving a spurious red "Publish CLI" run.
    # Requiring two dots (`v*.*.*`) excludes the bare `vN` tag entirely.
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance (OIDC-signed provenance attestation)

jobs:
  publish:
    name: Verify, then publish norma-design-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify — release tag matches the CLI version + changelog entry exists
        run: |
          ver=$(node -p "require('./packages/design-lint/package.json').version")
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "v$ver" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match CLI package.json v$ver — refusing to publish under the wrong ref"; exit 1
          fi
          # Anchor to the dated CLI section heading (escaping the dots). CHANGELOG.md interleaves the CLI and
          # standard version lines in one 1.x.y namespace, so an unscoped grep could match a `· standard`
          # heading (or a link-ref) for the same number and let a CLI publish through with no CLI notes.
          esc=$(printf '%s' "$ver" | sed 's/\./\\./g')
          grep -qE "^## \[$esc\] .*CLI" CHANGELOG.md || { echo "::error::CHANGELOG.md has no '## [$ver] … · CLI' release heading — add the CLI release notes before tagging"; exit 1; }
      - name: Verify — build + unit tests + anti-drift + dogfood
        run: |
          npm run build
          npm test
          npm run check:drift
          node packages/design-lint/dist/cli.js index.html
          # Never publish a bin that no-ops via npx/the installed bin: invoke it through a symlink and
          # require real output (the 1.8.0 main-module-guard bug exited 0 with no output that way).
          ln -sf "$PWD/packages/design-lint/dist/cli.js" "$RUNNER_TEMP/norma-bin"
          out=$(node "$RUNNER_TEMP/norma-bin" examples/catches-violations/index.html || true)
          [ -n "$out" ] || { echo "::error::CLI produced no output via a symlinked bin — refusing to publish a silent no-op"; exit 1; }
      - name: Browser self-test — axe × theme × lang, 0-network, overflow
        run: |
          npx playwright install --with-deps chromium firefox webkit
          npx playwright test
      - name: Publish (public, with provenance)
        working-directory: packages/design-lint
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # After a successful publish, fast-forward the major (vN) tag to this release so
  # `uses: anhquanpbc/norma@vN` resolves to the latest vN.x.y. Runs ONLY on a real tag push (skipped on
  # workflow_dispatch), needs the publish to have succeeded, and is the only job with write access.
  major-tag:
    name: Move the major (vN) tag to this release
    needs: publish
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the forward-only ancestry check below is reliable (not shallow)
      - name: Fast-forward vN → this release commit (forward-only)
        run: |
          tag="$GITHUB_REF_NAME"          # e.g. v1.20.2
          major="${tag%%.*}"              # v1
          case "$major" in v[0-9]*) ;; *) echo "::error::refusing to move a non-vN major tag ($major from $tag)"; exit 1;; esac
          git fetch origin "refs/tags/$major:refs/tags/$major" || true
          # Forward-only: never move vN backward. Re-running an OLD release's job (after a newer release already
          # advanced vN) would otherwise force-push vN back to the older commit. If vN exists and HEAD is an
          # ancestor of it, HEAD is not newer → skip (not an error).
          if git rev-parse -q --verify "refs/tags/$major^{commit}" >/dev/null 2>&1 \
             && git merge-base --is-ancestor HEAD "refs/tags/$major^{commit}"; then
            echo "$major already points at HEAD or a newer release — refusing to move it backward."; exit 0
          fi
          git tag -f "$major"             # lightweight tag at HEAD = the checked-out release commit
          git push -f origin "refs/tags/$major"
          echo "Moved $major → $tag ($(git rev-parse --short HEAD))"
