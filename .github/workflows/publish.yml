name: Publish CLI

# Push a tag (e.g. `git tag v1.0.1 && git push --tags`) to publish norma-design-lint.
# One-time setup by the maintainer: add an npm automation token as the NPM_TOKEN repo secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance (OIDC-signed provenance attestation)

jobs:
  publish:
    name: Verify, then publish norma-design-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify — release tag matches the CLI version + changelog entry exists
        run: |
          ver=$(node -p "require('./packages/design-lint/package.json').version")
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "v$ver" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match CLI package.json v$ver — refusing to publish under the wrong ref"; exit 1
          fi
          # Anchor to the dated CLI section heading (escaping the dots). CHANGELOG.md interleaves the CLI and
          # standard version lines in one 1.x.y namespace, so an unscoped grep could match a `· standard`
          # heading (or a link-ref) for the same number and let a CLI publish through with no CLI notes.
          esc=$(printf '%s' "$ver" | sed 's/\./\\./g')
          grep -qE "^## \[$esc\] .*CLI" CHANGELOG.md || { echo "::error::CHANGELOG.md has no '## [$ver] … · CLI' release heading — add the CLI release notes before tagging"; exit 1; }
      - name: Verify — build + unit tests + anti-drift + dogfood
        run: |
          npm run build
          npm test
          npm run check:drift
          node packages/design-lint/dist/cli.js index.html
          # Never publish a bin that no-ops via npx/the installed bin: invoke it through a symlink and
          # require real output (the 1.8.0 main-module-guard bug exited 0 with no output that way).
          ln -sf "$PWD/packages/design-lint/dist/cli.js" "$RUNNER_TEMP/norma-bin"
          out=$(node "$RUNNER_TEMP/norma-bin" examples/catches-violations/index.html || true)
          [ -n "$out" ] || { echo "::error::CLI produced no output via a symlinked bin — refusing to publish a silent no-op"; exit 1; }
      - name: Browser self-test — axe × theme × lang, 0-network, overflow
        run: |
          npx playwright install --with-deps chromium firefox webkit
          npx playwright test
      - name: Publish (public, with provenance)
        working-directory: packages/design-lint
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
