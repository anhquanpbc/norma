name: Deploy Pages

on:
  push:
    branches: [main]
    paths: [index.html, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate: never publish index.html unless the build, tests, anti-drift guard and
  # the site's own linter all pass on this exact commit.
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run check:drift
      - name: Lint the site against its own standard
        run: node packages/design-lint/dist/cli.js index.html
      - name: Install Playwright browsers (Chromium, Firefox, WebKit)
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Browser self-test — never publish a site that fails axe / interaction / 0-network / overflow
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pages-playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Stage the self-contained site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
