name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test & dogfood (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Build (rules + linter)
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Anti-drift (regenerate + diff + invariants)
        run: npm run check:drift
      - name: Dogfood — lint the reference site against its own standard
        run: |
          node packages/design-lint/dist/cli.js index.html --format sarif > design-lint.sarif
          node packages/design-lint/dist/cli.js index.html
      - name: Validate the design tokens (DTCG, Norma profile)
        run: node packages/design-lint/dist/cli.js tokens validate standard/tokens.tokens.json
      - name: CLI runs via a symlinked bin (the `npx` / installed-bin path, not just `node dist/cli.js`)
        shell: bash
        run: |
          ln -sf "$PWD/packages/design-lint/dist/cli.js" "$RUNNER_TEMP/norma-bin"
          set +e; out=$(node "$RUNNER_TEMP/norma-bin" examples/catches-violations/index.html); code=$?; set -e
          [ -n "$out" ] || { echo "::error::CLI produced no output via a symlinked bin — the main-module guard is broken (npx would silently no-op)"; exit 1; }
          [ "$code" -ne 0 ] || { echo "::error::expected a non-zero exit via the bin on the seeded-bad page"; exit 1; }
          echo "OK — CLI runs correctly when invoked through the bin"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: design-lint-sarif-node${{ matrix.node }}
          path: design-lint.sarif

  e2e:
    name: Browser self-test (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers (Chromium, Firefox, WebKit)
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run e2e (axe WCAG × theme × lang, interaction, 0-network, overflow — 3 browsers)
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  examples:
    name: Examples & action self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The reusable action must lint the clean starter with zero findings (exit 0).
      # This exercises action.yml end-to-end AND proves examples/minimal-pass is clean.
      - name: minimal-pass must lint clean via the action
        uses: ./
        with:
          globs: examples/minimal-pass/index.html
      # The seeded "before" page must fail (non-zero) and trip the rules it advertises.
      - name: catches-violations must fail and hit the seeded rules
        shell: bash
        run: |
          set +e
          node packages/design-lint/dist/cli.js examples/catches-violations/index.html --format json > out.json
          code=$?
          set -e
          test "$code" -ne 0 || { echo "expected a non-zero exit on the broken page"; exit 1; }
          node -e 'const d=require("./out.json"); if(d.errorCount<1){console.error("expected error-severity findings");process.exit(1)} const ids=[...new Set(d.findings.map(f=>f.ruleId))]; const need=["color.contrast.text","a11y.semantic-control","a11y.form-label","antipattern.indigo-default","antipattern.dead-href"]; const miss=need.filter(r=>!ids.includes(r)); if(miss.length){console.error("missing seeded rules: "+miss.join(", "));process.exit(1)} console.log("OK — "+ids.length+" rules hit, "+d.errorCount+" errors")'

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      # Advisory until the Dependency graph feature is enabled for this repo
      # (Settings → Advanced Security → Dependency graph). The action hard-errors with
      # "not supported on this repository" while it is off; keep it non-blocking so a
      # config toggle the maintainer owns can't red-X every PR. It becomes a real gate
      # the moment Dependency graph is turned on — no workflow change needed.
      - uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high
