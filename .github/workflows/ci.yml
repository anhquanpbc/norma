name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test & dogfood (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Build (rules + linter)
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Anti-drift (regenerate + diff + invariants)
        run: npm run check:drift
      - name: Dogfood — lint the reference site against its own standard
        run: |
          node packages/design-lint/dist/cli.js index.html --format sarif > design-lint.sarif
          node packages/design-lint/dist/cli.js index.html
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: design-lint-sarif-node${{ matrix.node }}
          path: design-lint.sarif

  e2e:
    name: Browser self-test (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers (Chromium, Firefox, WebKit)
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run e2e (axe WCAG × theme × lang, interaction, 0-network, overflow — 3 browsers)
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
