version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Bundle non-breaking npm updates into a single PR; majors stay separate for review.
      npm-minor-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Bundle all GitHub Actions bumps into a single PR.
      github-actions:
        patterns:
          - "*"
