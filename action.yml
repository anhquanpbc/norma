name: "Norma design lint"
description: "Lint HTML/CSS against the Norma web design standard (WCAG 2.2 + AI-era anti-patterns)."
author: "Norma"
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  globs:
    description: "Space-separated files/globs to lint (quote patterns with braces). Default matches the CLI — HTML/CSS plus JSX/TSX/Vue/Svelte components."
    required: false
    default: "**/*.{html,htm,css,jsx,tsx,vue,svelte}"
  lang:
    description: "Message language: en or vi."
    required: false
    default: "en"
  format:
    description: "Output format: stylish, json, or sarif."
    required: false
    default: "stylish"
  config:
    description: "Path to a .normarc.json config (optional)."
    required: false
    default: ""
  working-directory:
    description: "Directory to lint from (globs resolve relative to it)."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    # Builds the linter from THIS action's checkout, so the action works even before
    # norma-design-lint is published to npm. No design tokens/rules leave the repo.
    - uses: actions/setup-node@v6
      with:
        node-version: "22"
    - name: Build the Norma linter
      shell: bash
      run: npm ci --no-audit --no-fund && npm run build
      working-directory: ${{ github.action_path }}
    - name: Lint against the standard
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NORMA_GLOBS: ${{ inputs.globs }}
        NORMA_LANG: ${{ inputs.lang }}
        NORMA_FORMAT: ${{ inputs.format }}
        NORMA_CONFIG: ${{ inputs.config }}
        NORMA_CLI: ${{ github.action_path }}/packages/design-lint/dist/cli.js
      run: |
        args=( $NORMA_GLOBS --lang "$NORMA_LANG" --format "$NORMA_FORMAT" )
        if [ -n "$NORMA_CONFIG" ]; then args+=( --config "$NORMA_CONFIG" ); fi
        node "$NORMA_CLI" "${args[@]}"
